<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Al Noor Gold — Your Jewellery Concierge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C97A;--gold-pale:#F5E8C0;--obsidian:#0D0D0D;--charcoal:#1A1A1A;--slate:#2A2A2A;--text:#E8E0D0;--text-dim:#8A8070;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{background:var(--obsidian);font-family:'Jost',sans-serif;color:var(--text);height:100%;display:flex;flex-direction:column;overflow:hidden;position:fixed;width:100%;}
/* ── HEADER ── */
header{background:linear-gradient(135deg,var(--charcoal) 0%,#1C1408 100%);border-bottom:1px solid rgba(201,168,76,0.3);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
.brand{display:flex;align-items:center;gap:8px;min-width:0;}
.brand-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.brand-text{min-width:0;}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--gold-light);letter-spacing:0.05em;white-space:nowrap;}
.brand-sub{font-size:0.6rem;color:var(--text-dim);letter-spacing:0.12em;text-transform:uppercase;}
.rate-badge{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:14px;padding:5px 10px;font-size:0.7rem;color:var(--gold-light);cursor:pointer;transition:all 0.3s;text-align:right;flex-shrink:0;min-width:80px;}
.rate-badge:hover,.rate-badge:active{background:rgba(201,168,76,0.2);}
.rate-val{font-size:0.9rem;font-weight:500;display:block;}
.rate-label{color:var(--text-dim);font-size:0.6rem;}
/* ── QUICK ACTIONS ── */
.quick-actions{display:flex;gap:7px;padding:8px 14px;background:var(--charcoal);border-bottom:1px solid rgba(255,255,255,0.05);overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.quick-actions::-webkit-scrollbar{display:none;}
.qa-btn{white-space:nowrap;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);color:var(--gold-light);border-radius:18px;padding:5px 12px;font-size:0.72rem;font-family:'Jost',sans-serif;cursor:pointer;transition:all 0.2s;}
.qa-btn:hover,.qa-btn:active{background:rgba(201,168,76,0.2);border-color:var(--gold);}
/* ── CHAT AREA ── */
.chat-area{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch;}
.chat-area::-webkit-scrollbar{width:3px;}
.chat-area::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:2px;}
.message{display:flex;gap:8px;max-width:88%;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.message.user{margin-left:auto;flex-direction:row-reverse;}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.avatar.bot{background:linear-gradient(135deg,var(--gold),#8B6914);}
.avatar.user{background:var(--slate);}
.bubble{padding:10px 14px;border-radius:16px;font-size:0.84rem;line-height:1.6;}
.bubble.bot{background:var(--slate);border:1px solid rgba(201,168,76,0.1);color:var(--text);border-top-left-radius:4px;}
.bubble.user{background:linear-gradient(135deg,rgba(201,168,76,0.25),rgba(201,168,76,0.15));border:1px solid rgba(201,168,76,0.3);color:var(--text);border-top-right-radius:4px;}
/* ── PRODUCT GRID ── */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;margin-top:8px;}
.product-card{background:var(--charcoal);border:1px solid rgba(201,168,76,0.2);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.3s;}
.product-card:hover,.product-card:active{border-color:var(--gold);transform:translateY(-2px);}
.product-card img{width:100%;height:100px;object-fit:cover;background:var(--slate);}
.product-card-body{padding:8px;}
.product-card-name{font-size:0.75rem;font-weight:500;color:var(--gold-light);margin-bottom:2px;}
.product-card-weight{font-size:0.65rem;color:var(--text-dim);}
.product-card-price{font-size:0.8rem;color:var(--gold);font-weight:600;margin-top:4px;}
/* ── RATE CARD ── */
.rate-card{background:linear-gradient(135deg,#1C1408,var(--slate));border:1px solid rgba(201,168,76,0.4);border-radius:14px;padding:14px;margin-top:6px;}
.rate-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.rate-row:last-child{border:none;}
.rate-karat{color:var(--text-dim);font-size:0.78rem;}
.rate-price{color:var(--gold-light);font-weight:600;font-size:0.88rem;}
/* ── ORDER FORM ── */
.order-form{background:var(--charcoal);border:1px solid rgba(201,168,76,0.3);border-radius:14px;padding:14px;margin-top:6px;display:flex;flex-direction:column;gap:9px;}
.form-row{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:0.68rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;}
.form-input{background:var(--slate);border:1px solid rgba(201,168,76,0.2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Jost',sans-serif;font-size:0.84rem;outline:none;transition:border-color 0.2s;width:100%;}
.form-input:focus{border-color:var(--gold);}
.order-total{background:rgba(201,168,76,0.1);border-radius:8px;padding:10px;text-align:center;font-size:0.95rem;color:var(--gold-light);font-weight:600;}
.submit-btn{background:linear-gradient(135deg,var(--gold),#8B6914);color:var(--obsidian);border:none;border-radius:10px;padding:12px;font-family:'Jost',sans-serif;font-weight:500;font-size:0.88rem;cursor:pointer;letter-spacing:0.05em;transition:opacity 0.2s;width:100%;}
.submit-btn:hover,.submit-btn:active{opacity:0.85;}
/* ── TYPING ── */
.typing{display:flex;gap:5px;align-items:center;padding:4px 0;}
.typing span{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
/* ── INPUT BAR ── */
.input-bar{background:var(--charcoal);border-top:1px solid rgba(255,255,255,0.07);padding:10px 14px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;padding-bottom:max(10px, env(safe-area-inset-bottom));}
.chat-input{flex:1;background:var(--slate);border:1px solid rgba(201,168,76,0.2);border-radius:20px;padding:9px 14px;color:var(--text);font-family:'Jost',sans-serif;font-size:0.875rem;outline:none;resize:none;max-height:90px;transition:border-color 0.2s;line-height:1.4;}
.chat-input:focus{border-color:var(--gold);}
.chat-input::placeholder{color:var(--text-dim);}
.send-btn{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#8B6914);border:none;border-radius:50%;color:var(--obsidian);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.2s;flex-shrink:0;}
.send-btn:hover,.send-btn:active{transform:scale(1.08);}
/* ── RESPONSIVE TABLET/DESKTOP ── */
@media(min-width:768px){
  body{position:static;height:100vh;}
  header{padding:12px 24px;}
  .brand-icon{width:40px;height:40px;font-size:18px;}
  .brand-name{font-size:1.4rem;}
  .quick-actions{padding:10px 20px;gap:10px;}
  .qa-btn{font-size:0.76rem;padding:6px 14px;}
  .chat-area{padding:20px 24px;}
  .message{max-width:80%;}
  .product-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
  .product-card img{height:120px;}
  .input-bar{padding:12px 24px;}
  .rate-badge{min-width:90px;}
}
@media(min-width:1024px){
  .chat-area{max-width:860px;margin:0 auto;width:100%;padding:24px 0;}
  .input-bar{justify-content:center;}
  .input-bar>*{max-width:820px;}
  .input-bar .chat-input{flex:1;}
}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-icon">💎</div>
    <div class="brand-text">
      <div class="brand-name">Al Noor Gold</div>
      <div class="brand-sub">Fine Jewellery · Muscat</div>
    </div>
  </div>
  <div class="rate-badge" onclick="showRateCard()">
    <span class="rate-val" id="headerRate">Loading…</span>
    <span class="rate-label">24K / gram · Live</span>
  </div>
</header>
<div class="quick-actions">
  <button class="qa-btn" onclick="qm('Show me your gold catalog')">🛍️ Catalog</button>
  <button class="qa-btn" onclick="showRateCard()">📈 Live Rates</button>
  <button class="qa-btn" onclick="qm('Show me rings collection')">💍 Rings</button>
  <button class="qa-btn" onclick="qm('Show me necklaces')">📿 Necklaces</button>
  <button class="qa-btn" onclick="qm('Show me bracelets')">✨ Bracelets</button>
  <button class="qa-btn" onclick="showOrderForm()">📦 Place Order</button>
  <button class="qa-btn" onclick="qm('Calculate price for 10 gram 22K ring')">🧮 Price Calc</button>
  <button class="qa-btn" onclick="qm('What are your branch locations and timings?')">🏪 Branches</button>
</div>
<div class="chat-area" id="chatArea"></div>
<div class="input-bar">
  <textarea class="chat-input" id="chatInput" placeholder="Ask about jewellery, prices, orders…" rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
    oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px'"></textarea>
  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>
<script>
// ── CONFIG — replace these with your actual values ──
const GOLD_API_KEY = "goldapi-c36a3e84c694a2de90aa867206add82a-io";
const TG_TOKEN     = "8994630048:AAHL8Q95Mw8bxroByusTNbsEruNm0QVofCY";
const TG_CHAT      = "8994630048"; // ← your real Chat ID goes here
const N8N_BASE     = "https://swiftpixel.app.n8n.cloud";
const MAKING = {rings:2.5,necklaces:3.0,bracelets:2.8,earrings:2.2,bangles:2.0,pendants:2.5};

let goldRates = null, chatHistory = [];

const SYSTEM = `You are Noor, an elegant AI jewellery concierge for Al Noor Gold store in Muscat, Oman.
Help customers browse jewelry catalog, understand gold rates in OMR, calculate prices (gold cost + making charges + 5% VAT), place orders, and answer jewelry questions.
Be warm, knowledgeable and concise. Format prices as X.XXX OMR.
Store info: 4 branches in Muscat, Ruwi, Seeb, Nizwa. Open Sat–Thu 10am–10pm, Fri 4pm–10pm.
When asked to place an order, always say: "Let me bring up the order form for you — just tap 📦 Place Order above."`;

async function init() {
  await loadGoldRate();
  addBot(null, `<b style="color:var(--gold-light);font-family:'Cormorant Garamond',serif;font-size:1.1rem">✨ Welcome to Al Noor Gold</b><br><br>I'm <b>Noor</b>, your personal jewellery concierge. I can help you explore our collection, check live gold rates, calculate prices, and place orders.<br><br>How may I assist you today?`);
}

async function loadGoldRate() {
  try {
    const r = await fetch("https://www.goldapi.io/api/XAU/OMR", {headers:{"x-access-token": GOLD_API_KEY}});
    const d = await r.json();
    goldRates = {p24:d.price_gram_24k, p22:d.price_gram_22k||(d.price_gram_24k*22/24), p18:d.price_gram_18k||(d.price_gram_24k*18/24), ch:d.ch, chp:d.chp};
  } catch(e) {
    goldRates = {p24:24.5, p22:22.46, p18:18.37, fallback:true};
  }
  const el = document.getElementById('headerRate');
  if (el) el.textContent = goldRates.p24.toFixed(3) + ' OMR';
}

function calcPrice(w, k, cat) {
  const rate = k===24 ? goldRates.p24 : k===22 ? goldRates.p22 : goldRates.p18;
  const gold = rate*w, making = (MAKING[cat]||2.5)*w, sub = gold+making, vat = sub*0.05;
  return {gold:+gold.toFixed(3), making:+making.toFixed(3), sub:+sub.toFixed(3), vat:+vat.toFixed(3), total:+(sub+vat).toFixed(3)};
}

function addBot(text, html) {
  const a = document.getElementById('chatArea');
  const d = document.createElement('div'); d.className = 'message bot';
  d.innerHTML = `<div class="avatar bot">🌟</div><div class="bubble bot">${html||esc(text)}</div>`;
  a.appendChild(d); a.scrollTop = a.scrollHeight;
}
function addUser(text) {
  const a = document.getElementById('chatArea');
  const d = document.createElement('div'); d.className = 'message user';
  d.innerHTML = `<div class="avatar user">👤</div><div class="bubble user">${esc(text)}</div>`;
  a.appendChild(d); a.scrollTop = a.scrollHeight;
}
function showTyping() {
  const a = document.getElementById('chatArea');
  const d = document.createElement('div'); d.className = 'message bot'; d.id = 'typing';
  d.innerHTML = `<div class="avatar bot">🌟</div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>`;
  a.appendChild(d); a.scrollTop = a.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function qm(t) { document.getElementById('chatInput').value = t; sendMessage(); }

function showRateCard() {
  if (!goldRates) { addBot("Gold rates are loading, please wait a moment…"); return; }
  const chColor = goldRates.ch >= 0 ? '#4CAF50' : '#F44336';
  addBot(null, `<div class="rate-card">
    <div style="color:var(--gold-light);font-family:'Cormorant Garamond',serif;font-size:1.1rem;margin-bottom:10px">📊 Live Gold Rates — OMR/gram</div>
    <div class="rate-row"><span class="rate-karat">24 Karat (Pure)</span><span class="rate-price">${goldRates.p24.toFixed(3)} OMR</span></div>
    <div class="rate-row"><span class="rate-karat">22 Karat</span><span class="rate-price">${goldRates.p22.toFixed(3)} OMR</span></div>
    <div class="rate-row"><span class="rate-karat">18 Karat</span><span class="rate-price">${goldRates.p18.toFixed(3)} OMR</span></div>
    ${goldRates.ch !== undefined ? `<div class="rate-row"><span class="rate-karat">Today's Change</span><span class="rate-price" style="color:${chColor}">${goldRates.ch>=0?'+':''}${goldRates.ch?.toFixed(2)} (${goldRates.chp?.toFixed(2)}%)</span></div>` : ''}
    <div style="font-size:0.68rem;color:var(--text-dim);margin-top:8px">Live rate · ${new Date().toLocaleTimeString()} · Prices include 5% VAT</div>
  </div>`);
}

const CATALOG_ITEMS = {
  rings:[
    {name:"Classic Solitaire Ring",w:4.2,k:22,img:"https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=300&q=80"},
    {name:"Rose Twist Band",w:3.8,k:18,img:"https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=300&q=80"}
  ],
  necklaces:[
    {name:"Layered Chain Necklace",w:8.5,k:22,img:"https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=300&q=80"},
    {name:"Coin Pendant Necklace",w:6.2,k:24,img:"https://images.unsplash.com/photo-1506630448388-4e683c67ddb0?w=300&q=80"}
  ],
  bracelets:[
    {name:"Herringbone Bracelet",w:7.1,k:22,img:"https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=300&q=80"}
  ],
  earrings:[
    {name:"Gold Hoop Earrings",w:3.2,k:18,img:"https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?w=300&q=80"}
  ]
};

function showCatalog(query) {
  let cat = 'rings';
  if (query.includes('necklace')) cat = 'necklaces';
  else if (query.includes('bracelet')) cat = 'bracelets';
  else if (query.includes('earring')) cat = 'earrings';
  const items = CATALOG_ITEMS[cat] || CATALOG_ITEMS.rings;
  if (!goldRates || !items.length) return;
  let html = `<div style="font-size:0.78rem;color:var(--gold-light);margin-bottom:8px">${cat.charAt(0).toUpperCase()+cat.slice(1)} Collection</div><div class="product-grid">`;
  items.forEach(i => {
    const p = calcPrice(i.w, i.k, cat);
    html += `<div class="product-card" onclick="selectProduct('${i.name}',${i.w},${i.k},'${cat}')">
      <img src="${i.img}" alt="${i.name}" onerror="this.style.background='#2A2A2A'">
      <div class="product-card-body">
        <div class="product-card-name">${i.name}</div>
        <div class="product-card-weight">${i.w}g · ${i.k}K</div>
        <div class="product-card-price">${p.total.toFixed(3)} OMR</div>
      </div></div>`;
  });
  html += '</div>';
  addBot(null, html);
}
function selectProduct(name, w, k, cat) { qm(`I want to order the ${name} (${w}g, ${k}K). How do I place an order?`); }

function showOrderForm() {
  const a = document.getElementById('chatArea');
  const d = document.createElement('div'); d.className = 'message bot';
  d.innerHTML = `<div class="avatar bot">🌟</div><div class="bubble bot">
    <div style="color:var(--gold-light);font-family:'Cormorant Garamond',serif;font-size:1rem;margin-bottom:4px">📦 Place Your Order</div>
    <div style="font-size:0.72rem;color:var(--text-dim);margin-bottom:12px">Fill in your details and we'll confirm within 24 hours</div>
    <div class="order-form">
      <div class="form-row"><label class="form-label">Full Name</label><input class="form-input" id="ord_name" placeholder="Your full name"></div>
      <div class="form-row"><label class="form-label">Phone / WhatsApp</label><input class="form-input" id="ord_phone" placeholder="+968 XXXX XXXX" type="tel"></div>
      <div class="form-row"><label class="form-label">Item Description</label><input class="form-input" id="ord_item" placeholder="e.g. 22K Gold Ring, 5g"></div>
      <div class="form-row"><label class="form-label">Category</label>
        <select class="form-input" id="ord_cat" onchange="updateTotal()">
          <option value="rings">Ring</option><option value="necklaces">Necklace</option>
          <option value="bracelets">Bracelet</option><option value="earrings">Earrings</option>
          <option value="bangles">Bangles</option><option value="pendants">Pendant</option>
        </select>
      </div>
      <div class="form-row"><label class="form-label">Karat</label>
        <select class="form-input" id="ord_karat" onchange="updateTotal()">
          <option value="22">22 Karat</option><option value="18">18 Karat</option><option value="24">24 Karat</option>
        </select>
      </div>
      <div class="form-row"><label class="form-label">Weight (grams)</label><input class="form-input" id="ord_wt" type="number" inputmode="decimal" min="0.1" step="0.1" placeholder="e.g. 5" oninput="updateTotal()"></div>
      <div class="form-row"><label class="form-label">Delivery Address</label><input class="form-input" id="ord_addr" placeholder="Your address in Muscat"></div>
      <div class="order-total" id="orderTotal">Enter weight to see price estimate</div>
      <button class="submit-btn" onclick="submitOrder()">✨ Confirm Order</button>
    </div>
  </div>`;
  a.appendChild(d); a.scrollTop = a.scrollHeight;
}

function updateTotal() {
  const w = parseFloat(document.getElementById('ord_wt')?.value) || 0;
  const k = parseInt(document.getElementById('ord_karat')?.value) || 22;
  const cat = document.getElementById('ord_cat')?.value || 'rings';
  const el = document.getElementById('orderTotal'); if (!el) return;
  if (!w || !goldRates) { el.textContent = 'Enter weight to see price estimate'; return; }
  const p = calcPrice(w, k, cat);
  el.innerHTML = `<div style="font-size:0.68rem;color:var(--text-dim)">Gold: ${p.gold} + Making: ${p.making} + VAT: ${p.vat} OMR</div><div style="margin-top:4px;font-size:1rem">Total: ${p.total} OMR</div>`;
}

async function submitOrder() {
  const n  = document.getElementById('ord_name')?.value?.trim();
  const ph = document.getElementById('ord_phone')?.value?.trim();
  const it = document.getElementById('ord_item')?.value?.trim();
  const k  = parseInt(document.getElementById('ord_karat')?.value);
  const w  = parseFloat(document.getElementById('ord_wt')?.value);
  const cat = document.getElementById('ord_cat')?.value;
  const ad = document.getElementById('ord_addr')?.value?.trim();
  if (!n||!ph||!it||!w||!ad) { alert('Please fill in all required fields.'); return; }
  const p = goldRates ? calcPrice(w, k, cat) : null;
  const oid = 'ORD-' + Date.now().toString().slice(-6);
  const order = {orderId:oid,name:n,phone:ph,item:it,karat:k,weight:w,category:cat,address:ad,total:p?.total,timestamp:new Date().toISOString()};

  // Send to Telegram
  try {
    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        chat_id: TG_CHAT,
        text: `🛒 <b>NEW ORDER — ${oid}</b>\n👤 ${n} | 📞 ${ph}\n💍 ${it} (${k}K, ${w}g) · ${cat}\n📍 ${ad}\n💰 ${p?.total?.toFixed(3)||'TBD'} OMR\n⏰ ${new Date().toLocaleString()}`,
        parse_mode: 'HTML'
      })
    });
  } catch(e) { console.warn('TG error', e); }

  // Send to n8n → Google Sheets
  try {
    await fetch(N8N_BASE + '/webhook/save-order', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(order)
    });
  } catch(e) { console.warn('n8n error', e); }

  addBot(null, `<div style="color:#4CAF50;font-size:1rem;margin-bottom:8px">✅ Order Confirmed!</div>
    <b>Order ID:</b> ${oid}<br><b>Customer:</b> ${n} · ${ph}<br><b>Item:</b> ${it} (${k}K, ${w}g)<br><b>Category:</b> ${cat}<br>
    <b>Delivery:</b> ${ad}<br><b>Total:</b> ${p?.total?.toFixed(3)||'TBD'} OMR<br><br>
    <span style="color:var(--text-dim);font-size:0.76rem">Our team has been notified and will contact you within 2 hours. Thank you for choosing Al Noor Gold! 💛</span>`);
}

async function sendMessage() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim(); if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  addUser(text); chatHistory.push({role:'user', content:text});
  const lc = text.toLowerCase();
  if (lc.includes('rate')||lc.includes('gold price')||lc.includes('live gold')) { showRateCard(); return; }
  if (lc.includes('place order')||lc.includes('buy ')||lc.includes('purchase')) { showOrderForm(); return; }
  showTyping();
  try {
    const rc = goldRates ? `\nCurrent gold rates (OMR/gram): 24K=${goldRates.p24.toFixed(3)}, 22K=${goldRates.p22.toFixed(3)}, 18K=${goldRates.p18.toFixed(3)}` : '';
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:1000, system:SYSTEM+rc, messages:chatHistory.slice(-10)})
    });
    const data = await r.json();
    const reply = data.content?.[0]?.text || "I'm sorry, I couldn't process that. Please try again.";
    chatHistory.push({role:'assistant', content:reply});
    removeTyping();
    addBot(null, reply.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>'));
    if (lc.includes('catalog')||lc.includes('collection')||lc.includes('show me')) { showCatalog(lc); }
  } catch(e) {
    removeTyping(); addBot("I'm having trouble connecting right now. Please try again shortly.");
  }
}

init();
</script>
