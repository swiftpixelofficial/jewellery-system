<script>
const TG_TOKEN  = "8994630048:AAHL8Q95Mw8bxroByusTNbsEruNm0QVofCY";
const TG_CHAT   = "8994630048";
const N8N_BASE  = "https://swiftpixel.app.n8n.cloud";
const GOLD_API_KEY = "goldapi-c36a3e84c694a2de90aa867206add82a-io";
const MAKING = {rings:2.5,necklaces:3.0,bracelets:2.8,earrings:2.2,bangles:2.0,pendants:2.5};

let goldRates = null;
let allOrders = [];
let aiHistory = [];

const DEMO_ORDERS = [
  {orderId:'ORD-001',name:'Ahmed Al Balushi',phone:'+968 9123 4567',item:'22K Gold Ring',weight:5.2,karat:22,category:'rings',address:'Muscat',total:52.3,status:'pending',timestamp:'2025-06-06T08:30:00'},
  {orderId:'ORD-002',name:'Fatima Al Rashidi',phone:'+968 9234 5678',item:'18K Necklace',weight:8.5,karat:18,category:'necklaces',address:'Muscat',total:87.6,status:'processing',timestamp:'2025-06-06T09:15:00'}
];

function doLogin(){
  const u=document.getElementById('staffUser').value;
  const p=document.getElementById('staffPass').value;

  if(u==='staff'&&p==='staff123'){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('staffName').textContent='👤 '+u.toUpperCase();
    initStaff();
  } else {
    alert('Invalid credentials. Demo: staff / staff123');
  }
}

function logout(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
}

async function initStaff(){
  await loadGoldRate();
  loadOrders();
  loadInventory();
}

async function loadGoldRate(){
  try{
    const r = await fetch("https://www.goldapi.io/api/XAU/OMR",{
      headers: {"x-access-token": GOLD_API_KEY}
    });
    const d = await r.json();

    goldRates = {
      p24: d.price_gram_24k,
      p22: d.price_gram_22k || d.price_gram_24k * 22/24,
      p18: d.price_gram_18k || d.price_gram_24k * 18/24
    };
  } catch(e){
    goldRates = {p24:24.5,p22:22.46,p18:18.37};
  }

  document.getElementById('staffRate').textContent =
    `24K: ${goldRates.p24.toFixed(3)} OMR/g`;

  document.getElementById('s24k').textContent =
    goldRates.p24.toFixed(3);
}

function loadOrders(){
  allOrders = [...DEMO_ORDERS];
  renderOrders();
  renderStats();
}

function renderStats(){
  document.getElementById('sTodayOrders').textContent = allOrders.length;
  document.getElementById('sPending').textContent =
    allOrders.filter(o=>o.status==='pending').length;

  document.getElementById('sRevenue').textContent =
    allOrders.reduce((s,o)=>s+(+o.total||0),0).toFixed(3);
}

function renderOrders(filter='all'){
  const tbody = document.getElementById('ordersTbody');
  const list = filter==='all'
    ? allOrders
    : allOrders.filter(o=>o.status===filter);

  tbody.innerHTML = list.map(o=>`
    <tr>
      <td style="color:var(--gold-light)">${o.orderId}</td>
      <td>${o.name}<div style="font-size:0.7rem;color:var(--text-dim)">${o.phone}</div></td>
      <td>${o.item}</td>
      <td style="color:var(--gold)">${(+o.total).toFixed(3)} OMR</td>
      <td><span class="badge ${o.status}">${o.status}</span></td>
      <td style="font-size:0.7rem">${new Date(o.timestamp).toLocaleDateString()}</td>
      <td>
        ${o.status==='pending'
          ? `<button class="act-btn process" onclick="updateStatus('${o.orderId}','processing')">Process</button>`
          : ''}
        ${o.status==='processing'
          ? `<button class="act-btn dispatch" onclick="updateStatus('${o.orderId}','dispatched')">Dispatch</button>`
          : ''}
      </td>
    </tr>
  `).join('');
}

async function updateStatus(id,status){
  const order = allOrders.find(o=>o.orderId===id);
  if(!order) return;

  order.status = status;
  renderOrders();
  renderStats();

  try{
    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        chat_id:TG_CHAT,
        text:`📦 Order ${id} → ${status}`
      })
    });
  }catch(e){}
}

function filterOrders(f){
  renderOrders(f);
}

function loadInventory(){
  document.getElementById('invGrid').innerHTML = `
    <div class="inv-card">
      <div class="inv-cat">Rings</div>
      <div>Stock: 24</div>
    </div>
  `;
}

function showPanel(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
}

function calcUpdate(){
  const w = +document.getElementById('calc_wt').value || 0;
  const k = +document.getElementById('calc_karat').value || 22;
  const cat = document.getElementById('calc_cat').value;

  if(!w || !goldRates) return;

  const rate = k===24?goldRates.p24:k===22?goldRates.p22:goldRates.p18;

  const gold = rate*w;
  const making = (MAKING[cat]||2.5)*w;
  const vat = (gold+making)*0.05;

  document.getElementById('calcResult').style.display='block';
  document.getElementById('cr_gold').textContent = gold.toFixed(3);
  document.getElementById('cr_making').textContent = making.toFixed(3);
  document.getElementById('cr_vat').textContent = vat.toFixed(3);
  document.getElementById('cr_total').textContent = (gold+making+vat).toFixed(3);
}

/* ✅ FIXED GEMINI FUNCTION */
async function staffAsk(){
  const inp = document.getElementById('aiInput');
  const text = inp.value.trim();
  if(!text) return;

  inp.value='';

  const msgs = document.getElementById('aiMessages');

  const u = document.createElement('div');
  u.className='ai-msg user';
  u.textContent=text;
  msgs.appendChild(u);

  aiHistory.push({role:'user',content:text});

  const b = document.createElement('div');
  b.className='ai-msg bot';
  b.textContent='Thinking...';
  msgs.appendChild(b);

  try{
    const r = await fetch('/.netlify/functions/gemini-proxy',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        prompt: `
You are a staff assistant for a gold shop.

Conversation:
${aiHistory.map(m=>m.role+": "+m.content).join("\n")}
        `
      })
    });

    const data = await r.json();

    const reply =
      data?.candidates?.[0]?.content?.parts?.[0]?.text
      || "No response";

    b.textContent = reply;

    aiHistory.push({role:'assistant',content:reply});

  } catch(e){
    b.textContent = "Connection error";
  }

  msgs.scrollTop = msgs.scrollHeight;
}
</script>
